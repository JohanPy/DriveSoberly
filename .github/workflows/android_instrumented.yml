name: Android instrumented CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

jobs:
  connected-tests:
    name: Run connected Android tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run connected tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            set -eu

            wait_for_android() {
              adb wait-for-device
              until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do echo "Waiting for sys.boot_completed..."; sleep 5; done
              until [ "$(adb shell getprop dev.bootcomplete | tr -d '\r')" = "1" ]; do echo "Waiting for dev.bootcomplete..."; sleep 5; done
              until adb shell pm path android >/dev/null 2>&1; do echo "Waiting for Package Manager service..."; sleep 5; done
            }

            prepare_emulator() {
              adb shell input keyevent KEYCODE_WAKEUP || true
              adb shell locksettings set-disabled true || true
              adb shell wm dismiss-keyguard || true
              adb shell svc power stayon true || true
              adb shell settings put system screen_off_timeout 2147483647 || true
              adb shell settings put global window_animation_scale 0.0 || true
              adb shell settings put global transition_animation_scale 0.0 || true
              adb shell settings put global animator_duration_scale 0.0 || true
              adb shell settings put global verifier_verify_adb_installs 0 || true
              adb shell settings put global package_verifier_enable 0 || true
              adb shell settings put secure show_ime_with_hard_keyboard 0 || true
              adb shell settings put global drivesoberly_nosplash 1 || true
              adb shell settings put global stay_on_while_plugged_in 3 || true
              adb shell settings put secure accessibility_enabled 0 || true
            }

            run_connected_tests() {
              if ./gradlew connectedDebugAndroidTest --no-daemon > connected-tests.log 2>&1; then
                cat connected-tests.log
                return 0
              fi

              cat connected-tests.log
              return 1
            }

            wait_for_android
            prepare_emulator
            sleep 5

            if ! run_connected_tests; then
              if grep -Eq 'INSTRUMENTATION_ABORTED: System has crashed|DeadSystemException' connected-tests.log; then
                echo "Detected emulator system crash during instrumentation. Rebooting emulator and retrying once..."
                adb reboot || true
                wait_for_android
                prepare_emulator
                sleep 5
                run_connected_tests
              else
                exit 1
              fi
            fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/connected/
            connected-tests.log
