name: Android release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Sign release APK manually
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          # Decode keystore from base64
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
          
          # Find the unsigned APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          
          # Sign the APK using jarsigner (built into JDK)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$UNSIGNED_APK" "$KEY_ALIAS"
          
          # Verify signature
          jarsigner -verify -verbose "$UNSIGNED_APK"
          
          # Align the APK (if zipalign is available)
          if command -v zipalign &> /dev/null; then
            zipalign -v 4 "$UNSIGNED_APK" "$SIGNED_APK"
          else
            cp "$UNSIGNED_APK" "$SIGNED_APK"
          fi
          
          # Store signed APK path for later steps
          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Compute SHA256
        run: sha256sum "${{ env.SIGNED_APK }}" > SHA256SUMS.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ${{ env.SIGNED_APK }}

      - name: Upload SHA256 file
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.SIGNED_APK }}
            SHA256SUMS.txt
          generate_release_notes: true
