name: Android release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;35.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Sign release APK manually
        id: sign_apk
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          # Decode keystore from base64
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
          
          # Find the unsigned APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          ALIGNED_APK="${UNSIGNED_APK%.apk}-aligned.apk"
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          SDK_ROOT="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          ZIPALIGN_BIN=$(find "$SDK_ROOT/build-tools" -name zipalign | sort -V | tail -1)
          APKSIGNER_BIN=$(find "$SDK_ROOT/build-tools" -name apksigner | sort -V | tail -1)

          if [[ -z "$ZIPALIGN_BIN" || -z "$APKSIGNER_BIN" ]]; then
            echo "zipalign/apksigner not found in $SDK_ROOT/build-tools"
            exit 1
          fi

          # Android R+ requires resources.arsc uncompressed and 4-byte aligned.
          "$ZIPALIGN_BIN" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          
          # Sign aligned APK with apksigner (Android signature scheme v2/v3).
          "$APKSIGNER_BIN" sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          
          # Verify signature
          "$APKSIGNER_BIN" verify --verbose "$SIGNED_APK"
          
          # Store signed APK path for later steps
          echo "signed_apk=$SIGNED_APK" >> "$GITHUB_OUTPUT"

      - name: Rename signed APK
        id: rename_apk
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          RELEASE_APK="DriveSoberly-v${VERSION}.apk"
          mv "${{ steps.sign_apk.outputs.signed_apk }}" "$RELEASE_APK"
          echo "release_apk=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        run: sha256sum "${{ steps.rename_apk.outputs.release_apk }}" > SHA256SUMS.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ${{ steps.rename_apk.outputs.release_apk }}

      - name: Upload SHA256 file
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rename_apk.outputs.release_apk }}
            SHA256SUMS.txt
          generate_release_notes: false
