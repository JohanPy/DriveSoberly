name: Android release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Sign release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Compute SHA256
        run: sha256sum "${{ steps.sign_app.outputs.signedReleaseFile }}" > SHA256SUMS.txt

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload SHA256 file
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            SHA256SUMS.txt
          generate_release_notes: true
