AutoName: DriveSoberly
Summary: Offline blood alcohol estimation for driving decisions

Description: |-
  DriveSoberly helps estimate blood alcohol concentration (BAC) and whether it is safe to drive.

  Key points:
  * Offline-first app (no tracking, no analytics)
  * No runtime permissions required
  * Country-based legal BAC limits
  * Custom legal limit support via OTHER mode
  * Time projections for legal threshold and sobriety
  * Food-state aware two-compartment absorption model

  Disclaimer:
  This app provides estimates only and must not be used as a legal or medical device.

